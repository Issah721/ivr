<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVR Adherence Dashboard</title>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-normal tracking-normal text-sm">
    <nav class="bg-blue-600 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="font-bold text-lg tracking-wide hover:text-gray-200 transition-colors">Medication Adherence IVR</a>
            <div class="flex items-center space-x-4">
                <a href="/sus" class="text-sm bg-white text-blue-600 hover:bg-gray-100 font-bold py-1.5 px-4 rounded shadow transition-colors duration-200">SUS Questionnaire</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto mt-6">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
